# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# NovaX — Development docker-compose
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Usage:
#   docker compose up         # start all services
#   docker compose up --build # rebuild and start
#   docker compose down       # stop all services

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: novax-app:latest
    container_name: novax-app
    ports:
      - "3001:3000"
    environment:
      - RUST_LOG=info
      - HOST=0.0.0.0
      - PORT=3000
      - NOVAX_ENV=production
      - DATABASE_URL=postgres://novax:novax@postgres:5432/novax
      - DB_MAX_CONNECTIONS=10
      - JWT_SECRET=novax_dev_secret_change_in_production_please_use_a_long_random_string
      # Default Admin (auto-created on first startup)
      - ADMIN_EMAIL=admin@novax.local
      - ADMIN_PASSWORD=admin12345
      - ADMIN_NAME=Administrator
      # Rate Limiting
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_MAX_REQUESTS=100
      - RATE_LIMIT_WINDOW_SECONDS=60
      # OAuth (optional — uncomment and set to enable)
      # - GOOGLE_OAUTH_CLIENT_ID=your_google_client_id
      # - GOOGLE_OAUTH_CLIENT_SECRET=your_google_client_secret
      # - GITHUB_OAUTH_CLIENT_ID=your_github_client_id
      # - GITHUB_OAUTH_CLIENT_SECRET=your_github_client_secret
      # - OAUTH_REDIRECT_BASE=http://localhost:3000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: novax-postgres
    environment:
      POSTGRES_USER: novax
      POSTGRES_PASSWORD: novax
      POSTGRES_DB: novax
    ports:
      - "5433:5432"  # Use 5433 on host to avoid conflict with egp-exchange
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novax"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
