name: Feature Request
description: Suggest a new feature for NovaX
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else relevant?

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - runtime
        - network
        - router
        - storage
        - observability
        - macros
        - cli
        - ui
        - security
        - docs
        - other
    validations:
      required: true
